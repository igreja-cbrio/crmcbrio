# ══════════════════════════════════════
# CBRio PMO — Nginx com segurança completa
# Salvar em: /etc/nginx/sites-available/cbrio
# ══════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

# Redirecionar HTTP → HTTPS
server {
    listen 80;
    server_name SEU_DOMINIO;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name SEU_DOMINIO;

    # SSL (Certbot preenche automaticamente)
    # ssl_certificate /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;

    # ═══ HEADERS DE SEGURANÇA ═══
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # Esconder versão do Nginx
    server_tokens off;

    # Limitar tamanho do body (anti payload gigante)
    client_max_body_size 2m;

    # ═══ FRONTEND ═══
    location / {
        root /root/cbrio-pmo/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Cache de assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ═══ API ═══
    location /api/ {
        # Rate limiting
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://localhost:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Rate limit mais agressivo para login
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://localhost:3001/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Bloquear acesso direto a .env e outros arquivos sensíveis
    location ~ /\. {
        deny all;
        return 404;
    }
}
